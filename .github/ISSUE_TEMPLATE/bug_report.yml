name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels:
  - bug
assignees:
  - lippertmarkus
body:
  - type: checkboxes
    id: status_dashboard
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I checked the [COSMO status dashboard](https://cosmo-ppi.westeurope.cloudapp.azure.com/) for known issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem. Please remove sensitive data.
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: COSMO Alpaca Version (VS Code Extension)
      placeholder: e.g. 1.5.0
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
